<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppShellwithNamedAreas</title>
    <link rel="stylesheet" href="ws3-AppShellwithNamedAreas.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <strong>Editor</strong>
        <nav>
          <a href="#">Files</a>
          <a href="#">Preview</a>
          <a href="#">Share</a>
        </nav>
      </header>

      <aside class="rail">
        <button>New</button>
        <button>Search</button>
        <button>Git</button>
      </aside>

      <main class="workspace">
        <p class="eyebrow">Workspace</p>
        <h2>Design document</h2>
        <p>พื้นที่หลักสำหรับทำงานหรือแก้ไขเนื้อหา</p>
      </main>

      <aside class="inspector">
        <p class="eyebrow">Inspector</p>
        <label>Width</label>
        <div class="control"></div>
        <label>Spacing</label>
        <div class="control control--short"></div>
      </aside>
    </div>
    <br />
    <nav>
      <a href="ws4-Responsive.html">next page</a>
    </nav>
  </body>
</html>
